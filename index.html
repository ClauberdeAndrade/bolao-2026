const FB_URL = "https://bolao2026-f03cb-default-rtdb.firebaseio.com";

// Cache local para reduzir leituras desnecessárias
let fbCache = null;
let fbCacheTime = 0;
const FB_CACHE_TTL = 5000; // 5 segundos

async function fbRead() {
  const now = Date.now();
  if (fbCache && now - fbCacheTime < FB_CACHE_TTL) return fbCache;
  try {
    const r = await fetch(`${FB_URL}/bolao.json`);
    if (!r.ok) {
      console.error("fbRead error:", r.status);
      return fbCache || {};
    }
    const data = await r.json();
    fbCache = data || {};
    fbCacheTime = now;
    return fbCache;
  } catch (e) {
    console.error("fbRead fetch error:", e);
    return fbCache || {};
  }
}
async function fbWrite(key, value) {
  try {
    const r = await fetch(`${FB_URL}/bolao/${encodeURIComponent(key.replace(/:/g, "-"))}.json`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(value)
    });
    if (!r.ok) {
      console.error("fbWrite error:", r.status);
      return false;
    }
    // Atualiza cache
    if (fbCache) fbCache[key] = value;
    return true;
  } catch (e) {
    console.error("fbWrite error:", e);
    return false;
  }
}

    const r = await fetch(`${FB_URL}/bolao/${safeKey}.json`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(value)
    });
    if (!r.ok) {
      console.error("storageSet error:", r.status);
      return false;
    }
    if (fbCache) fbCache[safeKey] = value;
    fbCacheTime = Date.now();
    return true;
  } catch (e) {
    console.error("storageSet fetch error:", e);
    return false;
  }
}

function winnerOf(scoreA, scoreB, penalty) {

    b = Number(scoreB);
