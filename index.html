/* ===================== FIREBASE REALTIME DATABASE STORAGE ===================== */
const FB_URL = "https://bolao2026-f03cb-default-rtdb.firebaseio.com";

// Cache local para reduzir leituras desnecessárias
let fbCache = null;
let fbCacheTime = 0;
const FB_CACHE_TTL = 5000; // 5 segundos

async function fbRead() {
  const now = Date.now();
  if (fbCache && now - fbCacheTime < FB_CACHE_TTL) return fbCache;
  try {
    const r = await fetch(`${FB_URL}/bolao.json`);
    if (!r.ok) { console.error("fbRead error:", r.status); return fbCache || {}; }
    const data = await r.json();
    fbCache = data || {};
    fbCacheTime = now;
    return fbCache;
  } catch(e) { console.error("fbRead fetch error:", e); return fbCache || {}; }
}

async function fbWrite(key, value) {
  try {
    const r = await fetch(`${FB_URL}/bolao/${encodeURIComponent(key.replace(/:/g,"-"))}.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value)
    });
    if (!r.ok) { console.error("fbWrite error:", r.status); return false; }
    // Atualiza cache
    if (fbCache) fbCache[key] = value;
    return true;
  } catch(e) { console.error("fbWrite error:", e); return false; }
}

async function storageSet(key, value, shared = false) {
  // Backup local sempre
  try { localStorage.setItem("bolao_" + key, JSON.stringify(value)); } catch(e) {}
  // Firebase
  const safeKey = key.replace(/:/g, "-").replace(/\./g, "_");
  try {
    const r = await fetch(`${FB_URL}/bolao/${safeKey}.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(value)
    });
    if (!r.ok) { console.error("storageSet error:", r.status); return false; }
    if (fbCache) fbCache[safeKey] = value;
    fbCacheTime = Date.now();
    return true;
  } catch(e) {
    console.error("storageSet fetch error:", e);
    return false;
  }
}

async function storageGet(key, shared = false) {
  const safeKey = key.replace(/:/g, "-").replace(/\./g, "_");
  // Tenta Firebase
  try {
    const r = await fetch(`${FB_URL}/bolao/${safeKey}.json`);
    if (r.ok) {
      const data = await r.json();
      if (data !== null && data !== undefined) return data;
    }
  } catch(e) { console.error("storageGet fetch error:", e); }
  // Fallback localStorage
  try {
    const v = localStorage.getItem("bolao_" + key);
    if (v) return JSON.parse(v);
  } catch(e) {}
  return null;
}

/* ===================== ÁRVORE INDIVIDUAL ===================== */
function winnerOf(scoreA, scoreB, penalty) {
  const a = Number(scoreA), b = Number(scoreB);
  if (isNaN(a) || isNaN(b) || scoreA === "" || scoreB === "") return null;
  if (a > b) return "A";
  if (b > a) return "B";
  if (penalty === "A" || penalty === "B") return penalty;
  return null;
}

function buildPersonalBracket(matches, picks) {
  const byId = {};
  matches.forEach(m => { byId[m.id] = m; });
  const tree = {};
  matches.filter(m => m.phase === "32avos").forEach(m => { tree[m.id] = { teamA: m.teamA, teamB: m.teamB }; });

  const resolveWinner = (feedId) => {
    const feedMatch = byId[feedId];
    if (!feedMatch) return null;
    const pick = picks[feedId];
    const wasRefeito = pick && pick.refeito;
    if (wasRefeito && feedMatch.phase !== "32avos") {
      const w = winnerOf(pick.realBasedScoreA, pick.realBasedScoreB, pick.realBasedPenalty);
      if (w === "A") return feedMatch.teamA;
      if (w === "B") return feedMatch.teamB;
      return null;
    }
    const treeNode = tree[feedId];
    if (!pick || !treeNode) return null;
    const w = winnerOf(pick.scoreA, pick.scoreB, pick.penalty);
    if (w === "A") return treeNode.teamA;
    if (w === "B") return treeNode.teamB;
    return null;
  };

  // Segue a ordem das fases, resolvendo cada jogo a partir do FEED_MAP oficial
  ["oitavas", "quartas", "semis", "final"].forEach(phaseKey => {
    matches.filter(m => m.phase === phaseKey).forEach(m => {
      const feed = FEED_MAP[m.id];
      if (!feed) return;
      tree[m.id] = { teamA: resolveWinner(feed.feedA), teamB: resolveWinner(feed.feedB) };
    });
  });
  return tree;
}

    setLoginMode(people[name] ? "existing" : "new");
    setLoginPin("");
  };

    if (loginPin.length !== 4) { setLoginError("O PIN deve ter 4 dígitos."); return; }

      const updated = { ...people, [loginName]: { pin: loginPin } };
      setPeople(updated);
      await storageSet(K.people, updated, true);
      enterSession(loginName);

  const enterSession = (name) => {
    const person = ALL_PEOPLE.find(p => p.name === name);

    setView("palpites");

  const handleLogout = () => {
    setSession(null); setLoginName(""); setLoginPin(""); setLoginMode(null); setLoginError("");
    setMyPicks({}); myPicksRef.current = {};
  };

  const updatePick = (matchId, field, value) => {
    setMyPicks(prev => ({ ...prev, [matchId]: { ...(prev[matchId] || {}), [field]: value } }));
  };
  const savePicks = async (silent, isLast) => {
    const current = myPicksRef.current;
    const ok = await storageSet(K.picksPrefix + session.name, current, true);
    if (!silent) {
      if (ok) {
        if (isLast) {
          setCelebrating(true);
          setTimeout(() => setCelebrating(false), 4500);
        } else {
          showToast("✅ Palpites salvos e registrados com sucesso!");
        }
      } else {
        showToast("⚠️ Erro ao salvar — tente novamente.");
      }
    }
  };
  const lockScroll = (scrollY) => {
    const body = document.documentElement;
    body.style.scrollBehavior = "auto";
    const release = () => {
      window.scrollTo({ top: scrollY, behavior: "instant" });
      body.style.scrollBehavior = "";
    };
    release();
    requestAnimationFrame(() => { release(); requestAnimationFrame(() => { release(); setTimeout(release, 50); }); });
  };

  const chooseKeep = async (matchId) => {
    const scrollY = window.scrollY;
    const updated = { ...myPicks, [matchId]: { ...(myPicks[matchId] || {}), refeito: false } };
    setMyPicks(updated);
    await storageSet(K.picksPrefix + session.name, updated, true);
    lockScroll(scrollY);
  };
  const chooseRedo = async (matchId) => {
    const scrollY = window.scrollY;
    const updated = { ...myPicks, [matchId]: { ...(myPicks[matchId] || {}), refeito: true } };
    setMyPicks(updated);
    await storageSet(K.picksPrefix + session.name, updated, true);
    lockScroll(scrollY);
  };

  const updateMatchField = (matchId, field, value) => {
    setMatches(prev => prev.map(m => m.id === matchId ? { ...m, [field]: value } : m));
  };
  const fillTestData = async () => {
    // Só preenche slots ainda sem times — não sobrescreve os já confirmados
    const used = new Set(matches.filter(m => m.phase === "32avos" && (m.teamA || m.teamB)).flatMap(m => [m.teamA, m.teamB].filter(Boolean)));
    const available = [...teamNames].filter(t => !used.has(t)).sort(() => Math.random() - 0.5);
    let i = 0;
    const updated = matches.map(m => {
      if (m.phase !== "32avos") return m;
      const needA = !m.teamA, needB = !m.teamB;
      if (!needA && !needB) return m;
      return { ...m, teamA: needA ? (available[i++] || m.teamA) : m.teamA, teamB: needB ? (available[i++] || m.teamB) : m.teamB };
    });
    setMatches(updated);
    await storageSet(K.matches, updated, true);
    showToast("Slots vazios preenchidos com times de teste!");
  };

  const simulateResults = async () => {
    // Verifica se há times confirmados nos 32avos
    const ready = matches.filter(m => m.phase === "32avos" && m.teamA && m.teamB);
    if (ready.length === 0) { showToast("Primeiro confirme os times dos 32avos ou use 'Preencher confrontos de teste'."); return; }
    const scores = [[2,0],[1,0],[0,1],[1,2],[2,1],[0,2],[1,1],[3,1],[2,2],[0,0],[3,0],[1,3],[2,3],[1,0],[0,1],[2,1]];
    const penalties = ["A","B","A","B","A","B","A","B"];
    let pi = 0;
    const updated = matches.map((m, idx) => {
      if (m.phase !== "32avos" || !m.teamA || !m.teamB) return m;
      const [a, b] = scores[idx % scores.length];
      const pen = a === b ? penalties[pi++ % penalties.length] : null;
      return { ...m, realScoreA: String(a), realScoreB: String(b), realPenalty: pen, finished: true };
    });
    setMatches(updated);
    await storageSet(K.matches, updated, true);
    showToast("Resultados simulados lançados! Confira o Ranking.");
  };

  const autoFillPicks = async () => {
    const allIds = matches.map(m => m.id);
    const scoreOpts = ["0","1","2","3"];
    const penOpts = ["A","B"];

    for (const person of ALL_PEOPLE) {
      const name = person.name;
      const picks = {};
      allIds.forEach(id => {
        const a = scoreOpts[Math.floor(Math.random() * 4)];
        const b = scoreOpts[Math.floor(Math.random() * 4)];
        const pen = a === b ? penOpts[Math.floor(Math.random() * 2)] : null;
        picks[id] = { scoreA: a, scoreB: b, penalty: pen };
      });
      await storageSet(K.picksPrefix + name, picks, true);
      try { localStorage.setItem("bolao_" + K.picksPrefix + name, JSON.stringify(picks)); } catch(e) {}
    }
    // Garante cadastro de todos com PIN 1234 se ainda não tiverem
    const currentPeople = await storageGet(K.people, true) || {};
    const updatedPeople = { ...currentPeople };
    ALL_PEOPLE.forEach(p => { if (!updatedPeople[p.name]) updatedPeople[p.name] = { pin: "1234" }; });
    await storageSet(K.people, updatedPeople, true);
    showToast("Palpites gerados para todos os 14 participantes! PIN: 1234");
  };

  const propagateWinners = async () => {
    // Lê os vencedores reais dos 32avos e preenche os confrontos das oitavas
    // usando o FEED_MAP oficial (J89=J74×J77, J90=J73×J75, etc.)
    const byId = {};
    matches.forEach(m => { byId[m.id] = m; });

    const winnerOf = (m) => {
      if (!m || !m.finished || m.realScoreA === null || m.realScoreA === "") return null;
      const a = Number(m.realScoreA), b = Number(m.realScoreB);
      if (a > b) return m.teamA;
      if (b > a) return m.teamB;
      return m.realPenalty === "A" ? m.teamA : m.realPenalty === "B" ? m.teamB : null;
    };

    const updated = matches.map(m => {
      const feed = FEED_MAP[m.id];
      if (!feed) return m;
      const teamA = winnerOf(byId[feed.feedA]);
      const teamB = winnerOf(byId[feed.feedB]);
      if (!teamA && !teamB) return m;
      return { ...m, teamA: teamA || m.teamA, teamB: teamB || m.teamB };
    });

    setMatches(updated);
    await storageSet(K.matches, updated, true);
    showToast("Confrontos das fases seguintes atualizados com os vencedores reais!");
  };

  const clearAllData = async () => {
    const fresh = initialMatches();
    setMatches(fresh);
    await storageSet(K.matches, fresh, true);
    const freshStatus = { "32avos": "open", oitavas: "tree", quartas: "tree", semis: "tree", final: "tree" };
    setPhaseStatus(freshStatus);
    await storageSet(K.phaseStatus, freshStatus, true);
    for (const p of ALL_PEOPLE) {
      await storageSet(K.picksPrefix + p.name, {}, true);
      try { localStorage.removeItem("bolao_" + K.picksPrefix + p.name); } catch(e) {}
    }
    fbCache = null; // força releitura do Firebase
    showToast("✅ Todos os dados de teste removidos!");
  };

  const clearResults = async () => {
    const updated = matches.map(m => ({
      ...m, realScoreA: null, realScoreB: null, realPenalty: null, finished: false
    }));
    setMatches(updated);
    await storageSet(K.matches, updated, true);
    fbCache = null;
    showToast("✅ Resultados apagados. Times e palpites preservados.");
  };
  const saveMatches = async () => { await storageSet(K.matches, matches, true); showToast("Confrontos/resultados salvos!"); };
  const finishMatch = async (matchId) => {
    const m = matches.find(x => x.id === matchId);
    if (!m || !m.teamA || !m.teamB) { showToast("Confirme os dois times antes de lançar."); return; }
    if (m.realScoreA === null || m.realScoreA === undefined || m.realScoreA === "" ||
        m.realScoreB === null || m.realScoreB === undefined || m.realScoreB === "") {
      showToast("Preencha o placar real antes de lançar.");
      return;
    }
    const updated = matches.map(x => x.id === matchId ? { ...x, finished: true } : x);
    setMatches(updated); await storageSet(K.matches, updated, true);
    showToast("Resultado lançado!");
  };
  const setPhase = async (key, status) => {
    const updated = { ...phaseStatus, [key]: status };
    setPhaseStatus(updated); await storageSet(K.phaseStatus, updated, true);
    const ph = PHASES.find(p=>p.key===key);
    showToast((ph ? ph.label : key) + ": " + (status === "open" ? "aberta (confrontos reais)" : status === "tree" ? "árvore pessoal liberada" : status === "locked" ? "travada" : "encerrada"));
  };
  const resetPin = async (name, newPin) => {
    if (!/^\d{4}$/.test(newPin)) { showToast("PIN inválido"); return; }
    const updated = { ...people, [name]: { pin: newPin } };
    setPeople(updated); await storageSet(K.people, updated, true);
    showToast("PIN de " + name + " redefinido.");
  };

  const computeScoreForPerson = useCallback(async (name) => {
    const picks = await storageGet(K.picksPrefix + name, true);
    if (!picks) return 0;
    let total = 0;
    matches.forEach(m => {
      if (!m.finished || m.realScoreA === null || m.realScoreA === undefined || m.realScoreA === "") return;
      const pick = picks[m.id];
      if (!pick) return;
      let predA, predB, predPenalty;
      if (m.phase !== "32avos" && pick.refeito) {
        predA = pick.realBasedScoreA; predB = pick.realBasedScoreB; predPenalty = pick.realBasedPenalty;
      } else {
        predA = pick.scoreA; predB = pick.scoreB; predPenalty = pick.penalty;
      }
      if (predA === undefined || predA === "" || predA === null) return;
      const pA = Number(predA), pB = Number(predB);
      const rA = Number(m.realScoreA), rB = Number(m.realScoreB);
      const predWinner = pA > pB ? "A" : pA < pB ? "B" : (predPenalty || null);
      const realWinner = rA > rB ? "A" : rA < rB ? "B" : (m.realPenalty || null);
      if (!predWinner || !realWinner || predWinner !== realWinner) return;
      const exactOk = pA === rA && pB === rB;
      if (m.phase === "32avos") {
        total += exactOk ? POINTS["32avos"].exato : POINTS["32avos"].vencedor;
      } else {
        const tbl = POINTS[m.phase];
        const wasMantido = !pick.refeito;
        if (exactOk) total += wasMantido ? tbl.exatoMantido : tbl.exatoRefeito;
        else total += wasMantido ? tbl.vencedorMantido : tbl.vencedorRefeito;
      }
    });
    return total;
  }, [matches]);

  const [ranking, setRanking] = useState([]);
  const [familyRanking, setFamilyRanking] = useState([]);
  const [loadingRanking, setLoadingRanking] = useState(false);
  const refreshRanking = useCallback(async () => {
    setLoadingRanking(true);
    const names = ALL_PEOPLE.map(p => p.name);
    const scores = await Promise.all(names.map(async n => ({ name: n, family: ALL_PEOPLE.find(p=>p.name===n).family, score: await computeScoreForPerson(n) })));
    scores.sort((a, b) => b.score - a.score);
    setRanking(scores);
    const famAgg = {};
    scores.forEach(s => { if (!famAgg[s.family]) famAgg[s.family] = { total: 0, count: 0 }; famAgg[s.family].total += s.score; famAgg[s.family].count += 1; });
    const famArr = Object.entries(famAgg).map(([fam, d]) => ({ family: fam, avg: d.count ? d.total / d.count : 0 }));
    famArr.sort((a, b) => b.avg - a.avg);
    setFamilyRanking(famArr);
    setLoadingRanking(false);
  }, [computeScoreForPerson]);
  useEffect(() => { if (view === "ranking" && session) refreshRanking(); }, [view, session, refreshRanking]);

  if (booting) {
    return (
      <div style={S.bootScreen}>
        <div style={S.bootBadge}>⚽</div>
        <div style={{ color: "#cfead9", fontFamily: FONT_BODY, fontSize: 14, letterSpacing: 1 }}>carregando o bolão…</div>
      </div>
    );
  }
  if (!session) {
    return <LoginScreen loginName={loginName} loginPin={loginPin} loginMode={loginMode} loginError={loginError}
      setLoginPin={setLoginPin} handleSelectName={handleSelectName} handleLogin={handleLogin} setLoginMode={setLoginMode} />;
  }

  return (
    <div style={S.app}>
      <Header session={session} onLogout={handleLogout} view={view} setView={setView} />
      {toast && <div style={S.toast}>{toast}</div>}
      <div style={S.body}>
        {view === "palpites" && (
          <PalpitesView matches={matches} phaseStatus={phaseStatus} myPicks={myPicks} personalTree={personalTree}
            updatePick={updatePick} savePicks={savePicks} chooseKeep={chooseKeep} chooseRedo={chooseRedo}
            celebrating={celebrating} session={session} />
        )}
        {view === "ranking" && (
          <RankingView ranking={ranking} familyRanking={familyRanking} loading={loadingRanking} onRefresh={refreshRanking} session={session} />
        )}
        {view === "admin" && session.isAdmin && (
          <AdminView matches={matches} phaseStatus={phaseStatus} updateMatchField={updateMatchField} fillTestData={fillTestData} simulateResults={simulateResults} autoFillPicks={autoFillPicks} propagateWinners={propagateWinners} clearAllData={clearAllData} clearResults={clearResults}
            saveMatches={saveMatches} finishMatch={finishMatch} setPhase={setPhase} resetPin={resetPin} />
        )}
      </div>
    </div>
  );
}

    id: i,
    emoji: emojis[i % emojis.length],

        @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(360deg);opacity:0} }
        @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
      `}</style>
      {particles.map(p => (
        <div key={p.id} style={{ position: "fixed", top: 0, left: p.left + "%", fontSize: 20,
          animation: `fall ${p.duration}s ${p.delay}s ease-in forwards`, pointerEvents: "none", zIndex: 60 }}>
          {p.emoji}

      ))}
      <div style={S.celebrationCard}>

        </div>
      </div>
    </div>
  );
}

function PalpitesView({ matches, phaseStatus, myPicks, personalTree, updatePick, savePicks, chooseKeep, chooseRedo, celebrating, session }) {
  const [activePhase, setActivePhase] = useState("32avos");
  const phaseMatches = matches.filter(m => m.phase === activePhase);
  const status = phaseStatus[activePhase];
  const topRef = useRef(null);
  const [showNextPhase, setShowNextPhase] = useState(false);
  const [saved, setSaved] = useState(false);

  const flashSaved = () => { setSaved(true); setTimeout(() => setSaved(false), 2000); };

  const PHASE_NEXT = { "32avos": "oitavas", oitavas: "quartas", quartas: "semis", semis: "final", final: null };
  const PHASE_LABEL = { "32avos": "32avos", oitavas: "Oitavas", quartas: "Quartas", semis: "Semis", final: "Final" };

  const handleSave = async () => {
    const isLast = activePhase === "final";
    await savePicks(false, isLast);
    flashSaved();
    if (!isLast) {
      setShowNextPhase(true);
      window.scrollTo({ top: 0, behavior: "smooth" });
      topRef.current && topRef.current.scrollIntoView({ behavior: "smooth" });
    }
  };

  const goNextPhase = () => {
    const next = PHASE_NEXT[activePhase];
    if (next) { setActivePhase(next); setShowNextPhase(false); window.scrollTo({ top: 0, behavior: "smooth" }); }
  };

  return (
    <div>
      <div ref={topRef} />
      {celebrating && <Celebration name={session.name} />}

      {showNextPhase && PHASE_NEXT[activePhase] && (
        <div style={S.nextPhaseModal}>
          <div style={S.nextPhaseCard}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>✅</div>
            <div style={{ fontFamily: FONT_DISPLAY, fontSize: 18, color: COLORS.gold, marginBottom: 8 }}>
              Palpites salvos!
            </div>
            <div style={{ fontFamily: FONT_BODY, fontSize: 13.5, color: COLORS.textBody, marginBottom: 20, lineHeight: 1.5, textAlign: "center" }}>
              Quer ir agora para a fase de <strong>{PHASE_LABEL[PHASE_NEXT[activePhase]]}</strong> e continuar preenchendo sua árvore?
            </div>
            <button style={S.primaryBtn} onClick={goNextPhase}>
              Ir para {PHASE_LABEL[PHASE_NEXT[activePhase]]} →
            </button>
            <button style={{ ...S.secondaryBtn, marginTop: 8 }} onClick={() => setShowNextPhase(false)}>
              Ficar aqui por enquanto
            </button>
          </div>
        </div>
      )}
      <div style={S.phaseSelector}>
        {PHASES.map(p => (
          <button key={p.key} onClick={() => setActivePhase(p.key)}
            style={{ ...S.phaseChip, ...(activePhase === p.key ? S.phaseChipActive : {}), opacity: phaseStatus[p.key] === "locked" ? 0.45 : 1 }}>
            {p.short}{phaseStatus[p.key] === "locked" && <Lock size={10} style={{ marginLeft: 4 }} />}
          </button>
        ))}
      </div>

      {status === "locked" ? (
        <div style={S.lockedBox}>
          <Lock size={22} color="#9fbfae" />
          <div style={{ marginTop: 8, fontFamily: FONT_BODY, color: "#cfead9", fontSize: 13.5, textAlign: "center" }}>
            {activePhase === "32avos" ? "O administrador ainda está confirmando os confrontos desta fase." : "Essa fase ainda não foi liberada pelo administrador."}
          </div>
        </div>
      ) : (
        <div>
          <div style={S.phaseInfo}>
            {activePhase === "32avos"
              ? "Preencha o placar dos confrontos já confirmados pelo administrador. Os vencedores que você escolher aqui já formam, automaticamente, os jogos das fases seguintes — confira nas próximas abas."
              : status === "open"
              ? "Os confrontos reais desta fase já estão definidos. Compare com o seu palpite e decida: manter ou refazer."
              : "Esses são os confrontos da SUA árvore, gerados a partir dos seus palpites dos 32avos. Continue preenchendo — quando esta fase abrir oficialmente, você poderá manter ou refazer."}
          </div>
          <div style={S.matchList}>
            {phaseMatches.map(m => (
              <MatchCard key={m.id} match={m} pick={myPicks[m.id] || {}} updatePick={updatePick}
                phase={activePhase} status={status} treeNode={personalTree[m.id]}
                chooseKeep={chooseKeep} chooseRedo={chooseRedo} savePicks={savePicks} flashSaved={flashSaved} />
            ))}
          </div>
          {activePhase === "final" && (
            <div style={S.phaseInfo}>
              🏆 Esta é a última fase! Após salvar, todos os seus palpites estarão registrados do início ao fim do torneio.
            </div>
          )}
          <button style={{ ...S.primaryBtn, background: saved ? "#2d9e5f" : COLORS.gold, color: saved ? "#fff" : "#1a1306", transition: "background 0.3s, color 0.3s" }} onClick={handleSave}>
            <Check size={15} style={{marginRight:6}}/> {saved ? "Salvo! ✓" : "Salvar palpites"}
          </button>
        </div>
      )}
    </div>
  );
}

          <div style={S.teamFixedRow}>
            <div style={S.teamPending}>🔒 {match.originA || "vaga em aberto"}</div>
            <span style={S.vsLabel}>x</span>
            <div style={S.teamPending}>🔒 {match.originB || "vaga em aberto"}</div>
          </div>
        )}
        {ready ? (
          <ScoreRow pick={pick} updatePick={updatePick} matchId={match.id} scoreAField="scoreA" scoreBField="scoreB" penaltyField="penalty" teamA={match.teamA} teamB={match.teamB} />
        ) : (
          <div style={S.waitingNote}>Aguardando o administrador confirmar esse confronto.</div>
        )}
        {match.finished && match.realScoreA !== null && (
          <div style={S.realResult}>Resultado real: {match.realScoreA} × {match.realScoreB}{match.realPenalty ? " (pên. " + (match.realPenalty === "A" ? match.teamA : match.teamB) + ")" : ""}</div>
        )}
      </div>
    );
  }

  const tA = treeNode ? treeNode.teamA : null, tB = treeNode ? treeNode.teamB : null;
  const treeReady = tA && tB;
  const phaseIsReal = status === "open";
  const isRefeito = !!pick.refeito;

  return (
    <div style={S.matchCard}>
      {!treeReady && !phaseIsReal && (
        <div style={S.teamPending}>Complete os jogos anteriores da sua árvore para liberar este confronto.</div>
      )}
      {treeReady && !phaseIsReal && (
        <div>
          <div style={S.teamFixedRow}>

          <ScoreRow pick={pick} updatePick={updatePick} matchId={match.id} scoreAField="scoreA" scoreBField="scoreB" penaltyField="penalty" teamA={tA} teamB={tB} />
        </div>
      )}
      {phaseIsReal && (
        <div>
          {!isRefeito ? (
            <div>
              <div style={S.compareBox}>
                <div style={S.compareLine}><span style={S.compareLabel}>Seu palpite:</span> {tA ? flag(tA) + " " + tA : "—"} x {tB ? flag(tB) + " " + tB : "—"}</div>
                <div style={S.compareLine}><span style={S.compareLabel}>Confronto real:</span> {match.teamA ? flag(match.teamA) + " " + match.teamA : "—"} x {match.teamB ? flag(match.teamB) + " " + match.teamB : "—"}</div>
              </div>
              <ScoreRow pick={pick} updatePick={updatePick} matchId={match.id} scoreAField="scoreA" scoreBField="scoreB" penaltyField="penalty" teamA={tA} teamB={tB} />
              <div style={S.keepRedoRow}>
                <span style={S.keptTag}><Shield size={11}/> mantido</span>
                <button style={S.redoBtn} onClick={() => chooseRedo(match.id)}><Pencil size={11} style={{marginRight:4}}/> Refazer com os times reais</button>
              </div>
            </div>
          ) : (
            <div>
              <div style={S.teamFixedRow}>
                <div style={S.teamFixed}><span style={{fontSize:20}}>{flag(match.teamA)}</span><span>{match.teamA}</span></div>
                <span style={S.vsLabel}>x</span>
                <div style={S.teamFixed}><span style={{fontSize:20}}>{flag(match.teamB)}</span><span>{match.teamB}</span></div>
              </div>
              <ScoreRow pick={pick} updatePick={updatePick} matchId={match.id} scoreAField="realBasedScoreA" scoreBField="realBasedScoreB" penaltyField="realBasedPenalty" teamA={match.teamA} teamB={match.teamB} />
              <div style={S.keepRedoRow}>
                <span style={S.redoneTag}><Pencil size={11}/> refeito</span>
                <button style={S.redoBtn} onClick={() => chooseKeep(match.id)}>← voltar ao original</button>
              </div>
              <SaveBtn onSave={async () => { await savePicks(true); flashSaved && flashSaved(); }} />
            </div>
          )}
        </div>
      )}
      {match.finished && match.realScoreA !== null && (
        <div style={S.realResult}>Resultado real: {match.realScoreA} × {match.realScoreB}{match.realPenalty ? " (pên. " + (match.realPenalty === "A" ? match.teamA : match.teamB) + ")" : ""}</div>
      )}
    </div>
  );
}

function ScoreRow({ pick, updatePick, matchId, scoreAField, scoreBField, penaltyField, teamA, teamB }) {
  const a = pick[scoreAField], b = pick[scoreBField];
  const isDraw = a !== undefined && a !== "" && b !== undefined && b !== "" && Number(a) === Number(b);
  const filled = a !== undefined && a !== "" && a !== null && b !== undefined && b !== "" && b !== null;
  const valid = filled && (!isDraw || pick[penaltyField]);
  return (
    <div>
      <div style={{ ...S.scoreRow, alignItems: "center" }}>
        <input type="tel" inputMode="numeric" maxLength={1} style={S.scoreInput} value={a == null ? "" : a}
          onChange={e => updatePick(matchId, scoreAField, e.target.value.replace(/\D/g,"").slice(0,1))} placeholder="-" />
        <span style={S.scoreDash}>×</span>
        <input type="tel" inputMode="numeric" maxLength={1} style={S.scoreInput} value={b == null ? "" : b}
          onChange={e => updatePick(matchId, scoreBField, e.target.value.replace(/\D/g,"").slice(0,1))} placeholder="-" />
        {valid && <span style={S.pickConfirmed}><Check size={12}/> confirmado</span>}
      </div>
      {isDraw && (
        <div style={S.penaltyRow}>
          <span style={S.penaltyLabel}>Empatou — quem ganhou nos pênaltis?</span>
          <div style={{ display: "flex", gap: 6, marginTop: 5 }}>
            <button style={{ ...S.penaltyBtn, ...(pick[penaltyField] === "A" ? S.penaltyBtnActive : {}) }}
              onClick={() => updatePick(matchId, penaltyField, "A")}>{teamA ? flag(teamA) + " " + teamA : "Time A"}</button>
            <button style={{ ...S.penaltyBtn, ...(pick[penaltyField] === "B" ? S.penaltyBtnActive : {}) }}
              onClick={() => updatePick(matchId, penaltyField, "B")}>{teamB ? flag(teamB) + " " + teamB : "Time B"}</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ActionBtn({ label, onAction, color, confirmLabel, style: extraStyle }) {
  const [state, setState] = useState("idle"); // idle | confirm | loading | done
  const handle = async () => {
    if (state === "idle") { setState("confirm"); setTimeout(() => setState(s => s === "confirm" ? "idle" : s), 4000); return; }
    if (state === "confirm") {
      setState("loading");
      await onAction();
      setState("done");
      setTimeout(() => setState("idle"), 2000);
    }
  };
  const bg = state === "done" ? "#2d9e5f" : state === "confirm" ? "#c0392b" : state === "loading" ? "#666" : "transparent";
  const col = state === "idle" ? (color || COLORS.textMuted) : "#fff";
  const border = state === "idle" ? `1px solid ${color || COLORS.border}` : "none";
  const lbl = state === "confirm" ? `⚠️ Confirmar: ${confirmLabel || label}` : state === "loading" ? "⏳ Processando…" : state === "done" ? "✅ Concluído!" : label;
  return (
    <button onClick={handle}
      style={{ ...S.secondaryBtn, marginTop: 6, background: bg, color: col, border, transition: "all 0.25s", ...extraStyle }}>
      {lbl}
    </button>
  );
}

function DiagnosticPanel() {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);

  const check = async () => {
    setLoading(true);
    const results = await Promise.all(ALL_PEOPLE.map(async p => {
      const picks = await storageGet(K.picksPrefix + p.name, true);
      const count = picks ? Object.keys(picks).filter(k => {
        const pick = picks[k];
        return pick && (pick.scoreA !== undefined && pick.scoreA !== "" && pick.scoreA !== null);
      }).length : 0;
      return { name: p.name, family: p.family, count, hasPicks: count > 0 };
    }));
    setReport(results);
    setLoading(false);
  };

  return (
    <div style={S.adminSection}>
      <div style={S.adminTitle}>📊 Diagnóstico de palpites</div>
      <div style={S.adminHint}>Verifica quem já tem palpites salvos e quantos jogos foram preenchidos.</div>
      <button style={{ ...S.smallBtn, marginTop: 10 }} onClick={check}>{loading ? "Verificando…" : "Verificar agora"}</button>
      {report && (
        <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 6 }}>
          {report.map(r => (
            <div key={r.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
              background: r.hasPicks ? "rgba(127,217,154,0.08)" : "rgba(255,255,255,0.03)", borderRadius: 8, padding: "6px 10px" }}>
              <div>
                <span style={{ fontFamily: FONT_BODY, fontSize: 13, color: r.hasPicks ? "#7fd99a" : COLORS.textMuted, fontWeight: 600 }}>{r.name}</span>
                <span style={{ fontFamily: FONT_BODY, fontSize: 10, color: COLORS.textMuted, marginLeft: 6 }}>({r.family})</span>
              </div>
              <span style={{ fontFamily: FONT_DISPLAY, fontSize: 13, color: r.hasPicks ? COLORS.gold : COLORS.textMuted }}>

      )}

  );
}
